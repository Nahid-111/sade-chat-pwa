<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Style Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #dddbd1; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-container { width: 400px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; gap: 20px; }
        #login-container h2 { color: #008069; margin-bottom: 10px; }
        #username-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        #login-btn { background: #00a884; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #login-btn:hover { background: #008069; }
        #chat-container { width: 450px; height: 90vh; background: #efeae2; display: none; flex-direction: column; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); overflow: hidden; }
        #header { background: #008069; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        #messages { list-style-type: none; padding: 20px; flex-grow: 1; overflow-y: auto; background-image: url('https://githubusercontent.com'); background-blend-mode: overlay; background-color: #efeae2; display: flex; flex-direction: column; }
        #messages li { max-width: 75%; padding: 8px 12px; margin-bottom: 10px; border-radius: 7px; position: relative; font-size: 15px; line-height: 1.4; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .msg-received { background: white; align-self: flex-start; border-top-left-radius: 0 !important; }
        .msg-sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0 !important; }
        .username { font-weight: bold; font-size: 12px; color: #128c7e; margin-bottom: 2px; }
        .msg-text { color: #111; margin-bottom: 12px; }
        .chat-image { max-width: 100%; border-radius: 5px; margin-bottom: 12px; display: block; }
        .chat-audio { margin-bottom: 12px; width: 100%; max-width: 240px; outline: none; }
        .time { font-size: 10px; color: #667781; position: absolute; bottom: 2px; right: 7px; }
        #form { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #e9edef; }
        #input { flex-grow: 1; padding: 12px; border: none; border-radius: 8px; outline: none; font-size: 15px; background: white; }
        .attach-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #54656f; padding: 0 5px; }
        #image-input { display: none; }
        
        /* Səs yazma düyməsinin rəng dəyişmə effekti */
        .voice-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #54656f; padding: 0 5px; transition: color 0.2s; }
        .recording { color: red !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        #send-btn { background: #00a884; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
        #send-btn:hover { background: #008069; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>WhatsApp Canlı Chat</h2>
        <p style="color: #666; font-size: 14px;">Daxil olmaq üçün adınızı yazın:</p>
        <input type="text" id="username-input" placeholder="Adınız..." autocomplete="off">
        <button id="login-btn">Çata Daxil Ol</button>
    </div>

    <div id="chat-container">
        <div id="header">WhatsApp Canlı Chat (<span id="my-name">...</span>)</div>
        <ul id="messages"></ul>
        <form id="form" action="">
            <!-- Şəkil Düyməsi -->
            <label for="image-input" class="attach-btn">📎</label>
            <input type="file" id="image-input" accept="image/*">
            
            <!-- SƏS YAZMA DÜYMƏSİ (🎙️) -->
            <button type="button" id="voice-btn" class="voice-btn">🎙️</button>

            <input id="input" autocomplete="off" placeholder="Mesajınızı yazın..." />
            <button id="send-btn">Göndər</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();https://sade-chat-pwa.onrender.com
        
        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const myNameSpan = document.getElementById('my-name');
        
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const imageInput = document.getElementById('image-input');
        const voiceBtn = document.getElementById('voice-btn');
        const messages = document.getElementById('messages');
        
        let myUsername = localStorage.getItem('chat_username');
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;

        if (myUsername) { startChat(myUsername); }

        loginBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name) {
                localStorage.setItem('chat_username', name);
                startChat(name);
            }
        });

        function startChat(username) {
            myUsername = username;
            myNameSpan.textContent = myUsername;
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
        }

        function appendMessage(msg) {
            const item = document.createElement('li');
            if (msg.username === myUsername) {
                item.classList.add('msg-sent');
            } else {
                item.classList.add('msg-received');
            }

            let contentHTML = `<div class="username">${msg.username}</div>`;
            if (msg.image) { contentHTML += `<img src="${msg.image}" class="chat-image" />`; }
            
            // Əgər mesajda səs yazısı varsa audio pleyer əlavə et
            if (msg.audio) { 
                contentHTML += `<audio src="${msg.audio}" controls class="chat-audio"></audio>`; 
            }
            
            if (msg.text) { contentHTML += `<div class="msg-text">${msg.text}</div>`; }
            contentHTML += `<div class="time">${msg.time}</div>`;
            
            item.innerHTML = contentHTML;
            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
        }

        // ŞƏKİL SEÇİLƏNDƏ
        imageInput.addEventListener('change', () => {
            const file = imageInput.files[0];
            if (!file) return;
            const formData = new FormData();
            formData.append('image', file);
            fetch('/upload', { method: 'POST', body: formData })
            .then(res => res.json())
            .then(data => {
                if (data.imageUrl) {
                    socket.emit('chat mesajı', { username: myUsername, text: '', image: data.imageUrl, audio: null });
                }
            });
            imageInput.value = '';
        });

        // SƏS YAZMA MƏNTİQİ (MİKROFON)
        voiceBtn.addEventListener('click', () => {
            if (!isRecording) {
                // Mikrofon icazəsi istəyirik
                navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    mediaRecorder = new MediaRecorder(stream);
                    audioChunks = [];
                    
                    mediaRecorder.addEventListener("dataavailable", event => {
                        audioChunks.push(event.data);
                    });

                    mediaRecorder.addEventListener("stop", () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        const reader = new FileReader();
                        reader.readAsDataURL(audioBlob); 
                        reader.onloadend = () => {
                            const base64Audio = reader.result;
                            // Səsi birbaşa çat otağına göndəririk
                            socket.emit('chat mesajı', {
                                username: myUsername,
                                text: '',
                                image: null,
                                audio: base64Audio
                            });
                        }
                    });

                    mediaRecorder.start();
                    isRecording = true;
                    voiceBtn.classList.add('recording'); // Düyməni qırmızı et
                })
                .catch(err => alert("Mikrofona icazə verilmədi!"));
            } else {
                // Əgər artıq səs yazılırdısa, dayandır və göndər
                mediaRecorder.stop();
                isRecording = false;
                voiceBtn.classList.remove('recording'); // Qırmızı rəngi sil
            }
        });

        socket.on('keçmiş mesajlar', (savedMessages) => {
            messages.innerHTML = '';
            savedMessages.forEach(msg => appendMessage(msg));
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                socket.emit('chat mesajı', { username: myUsername, text: input.value, image: null, audio: null });
                input.value = '';
            }
        });
