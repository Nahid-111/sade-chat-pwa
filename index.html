<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sade Chat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: #dddbd1; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-container { width: 350px; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #username-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; margin-bottom: 15px; outline: none; }
        #login-btn { width: 100%; background: #00a884; color: white; border: none; padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #chat-container { width: 400px; height: 85vh; background: #efeae2; display: none; flex-direction: column; border-radius: 8px; overflow: hidden; }
        #header { background: #008069; color: white; padding: 15px; font-weight: bold; }
        #messages { list-style-type: none; padding: 15px; flex-grow: 1; overflow-y: auto; }
        #messages li { padding: 8px 12px; margin-bottom: 8px; background: white; border-radius: 6px; width: fit-content; max-width: 80%; }
        #form { background: #f0f2f5; padding: 10px; display: flex; gap: 10px; }
        #input { flex-grow: 1; padding: 10px; border: none; border-radius: 6px; outline: none; }
        #send-btn { background: #00a884; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
    </style>
    <!-- Server bağlantı kitabxanası -->
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <!-- GİRİŞ PANELİ -->
    <div id="login-container">
        <h3 style="color: #008069; margin-bottom: 15px;">WhatsApp Canlı Chat</h3>
        <input type="text" id="username-input" placeholder="Adınızı yazın...">
        <button id="login-btn">Çata Daxil Ol</button>
    </div>

    <!-- ƏSAS ÇAT PANELİ -->
    <div id="chat-container">
        <div id="header">Canlı Chat (<span id="my-name">...</span>)</div>
        <ul id="messages"></ul>
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="Mesajınızı yazın..." required />
            <button id="send-btn">Göndər</button>
        </form>
    </div>

    <script>
        // Serverə qoşulma əmri
        const socket = io(); 

        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const myNameSpan = document.getElementById('my-name');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        
        let myUsername = "";

        // DÜYMƏYƏ BASANDA REAKSİYA VERMƏK (DONMA ŞANSI YOXDUR!)
        loginBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name) {
                myUsername = name;
                myNameSpan.textContent = myUsername;
                loginContainer.style.display = 'none'; // Girişi gizlət
                chatContainer.style.display = 'flex'; // Çatı aç
            } else {
                alert("Ad boş ola bilməz!");
            }
        });

        // Mesaj göndərmək
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                socket.emit('chat mesajı', {
                    username: myUsername,
                    text: input.value
                });
                input.value = '';
            }
        });

        // Canlı mesaj gələndə ekrana yaz
        socket.on('chat mesajı', (msg) => {
            const item = document.createElement('li');
            item.textContent = msg.username + ": " + msg.text;
            messages.appendChild(item);
            messages.scrollTop = messages.scrollHeight;
        });

        // Keçmiş mesajları gətir
        socket.on('keçmiş mesajlar', (savedMessages) => {
            messages.innerHTML = '';
            savedMessages.forEach(msg => {
                const item = document.createElement('li');
                item.textContent = msg.username + ": " + msg.text;
                messages.appendChild(item);
            });
        });
    </script>
</body>
</html>
