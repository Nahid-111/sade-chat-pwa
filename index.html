<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürətli Canlı Çat</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #dddbd1; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-container { width: 400px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; }
        #login-container h2 { color: #008069; margin-bottom: 20px; }
        #username-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 20px; }
        #login-btn { width: 100%; background: #00a884; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #login-btn:hover { background: #008069; }
        
        #chat-container { width: 450px; height: 90vh; background: #efeae2; display: none; flex-direction: column; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); overflow: hidden; }
        #header { background: #008069; color: white; padding: 15px; font-size: 18px; font-weight: bold; }
        #messages { list-style-type: none; padding: 20px; flex-grow: 1; overflow-y: auto; display: flex; flex-direction: column; }
        #messages li { max-width: 75%; padding: 8px 12px; margin-bottom: 10px; border-radius: 7px; font-size: 15px; background: white; align-self: flex-start; box-shadow: 0 1px 1px rgba(0,0,0,0.1); }
        .my-msg { background: #d9fdd3 !important; align-self: flex-end !important; }
        #form { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; }
        #input { flex-grow: 1; padding: 12px; border: none; border-radius: 8px; outline: none; }
        #send-btn { background: #00a884; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <!-- GİRİŞ EKRANI -->
    <div id="login-container">
        <h2>Sürətli Canlı Çat</h2>
        <input type="text" id="username-input" placeholder="Adınızı yazın..." autocomplete="off">
        <button id="login-btn">Çata Daxil Ol</button>
    </div>

    <!-- ƏSAS ÇAT EKRANI -->
    <div id="chat-container">
        <div id="header">Canlı Chat (<span id="my-name">...</span>)</div>
        <ul id="messages"></ul>
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="Mesajınızı yazın..." required />
            <button id="send-btn">Göndər</button>
        </form>
    </div>

    <script>
        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const myNameSpan = document.getElementById('my-name');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        
        let myUsername = "";

        // DÜYMƏYƏ BASANDA İRƏLİ KEÇMƏK MEXANİZMİ (HEÇ BİR SERVERƏ BAĞLI DEYİL, 100% İŞLƏYƏCƏK!)
        loginBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name) {
                myUsername = name;
                myNameSpan.textContent = myUsername;
                loginContainer.style.display = 'none'; // Giriş ekranını gizlət
                chatContainer.style.display = 'flex'; // Çat ekranını aç
            } else {
                alert("Zəhmət olmasa adınızı yazın!");
            }
        });

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                const item = document.createElement('li');
                item.classList.add('my-msg');
                item.textContent = myUsername + ": " + input.value;
                messages.appendChild(item);
                input.value = '';
                messages.scrollTop = messages.scrollHeight;
            }
        });
    </script>
</body>
</html>
