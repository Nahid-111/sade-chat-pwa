<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Web Style Chat & Audio Call</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #dddbd1; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #login-container { width: 400px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; display: flex; flex-direction: column; gap: 20px; }
        #login-container h2 { color: #008069; margin-bottom: 10px; }
        #username-input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; outline: none; }
        #login-btn { background: #00a884; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }
        #login-btn:hover { background: #008069; }
        
        #chat-container { width: 450px; height: 90vh; background: #efeae2; display: none; flex-direction: column; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); overflow: hidden; position: relative; }
        #header { background: #008069; color: white; padding: 15px; font-size: 18px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; }
        
        /* CANLI ZƏNG PANELİ DIZAYNI */
        #call-status-panel { display: none; background: #128c7e; color: white; padding: 10px; text-align: center; font-size: 14px; position: absolute; top: 55px; left: 0; width: 100%; z-index: 10; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .end-call-btn { background: red; color: white; border: none; padding: 6px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }

        #messages { list-style-type: none; padding: 20px; flex-grow: 1; overflow-y: auto; background-image: url('https://githubusercontent.com'); background-blend-mode: overlay; background-color: #efeae2; display: flex; flex-direction: column; }
        #messages li { max-width: 75%; padding: 8px 12px; margin-bottom: 10px; border-radius: 7px; position: relative; font-size: 15px; line-height: 1.4; word-wrap: break-word; box-shadow: 0 1px 1px rgba(0,0,0,0.1); display: flex; flex-direction: column; }
        .msg-received { background: white; align-self: flex-start; border-top-left-radius: 0 !important; }
        .msg-sent { background: #d9fdd3; align-self: flex-end; border-top-right-radius: 0 !important; }
        .username { font-weight: bold; font-size: 12px; color: #128c7e; margin-bottom: 2px; }
        .msg-text { color: #111; margin-bottom: 12px; }
        .chat-image { max-width: 100%; border-radius: 5px; margin-bottom: 12px; display: block; }
        .chat-audio { margin-bottom: 12px; width: 100%; max-width: 240px; outline: none; }
        .time { font-size: 10px; color: #667781; position: absolute; bottom: 2px; right: 7px; }
        
        #form { background: #f0f2f5; padding: 10px; display: flex; align-items: center; gap: 10px; border-top: 1px solid #e9edef; }
        #input { flex-grow: 1; padding: 12px; border: none; border-radius: 8px; outline: none; font-size: 15px; background: white; }
        .action-btn { background: none; border: none; font-size: 22px; cursor: pointer; color: #54656f; padding: 0 5px; }
        #image-input { display: none; }
        .recording { color: red !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        #send-btn { background: #00a884; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 15px; }
    </style>
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>

    <div id="login-container">
        <h2>WhatsApp Canlı Chat</h2>
        <input type="text" id="username-input" placeholder="Adınız..." autocomplete="off">
        <button id="login-btn">Çata Daxil Ol</button>
    </div>

    <div id="chat-container">
        <div id="header">
            <div>WhatsApp Canlı (<span id="my-name">...</span>)</div>
            <!-- SƏSLİ ZƏNG DÜYMƏSİ -->
            <button type="button" id="call-btn" class="action-btn" style="color:white; font-size:16px;">📞 Zəng Et</button>
        </div>
        
        <!-- Canlı Zəng Paneli -->
        <div id="call-status-panel">
            <span id="call-status-text">Zəng edilir...</span>
            <button id="end-call-btn" class="end-call-btn">Zəngi Bitir</button>
        </div>

        <ul id="messages"></ul>
        <form id="form" action="">
            <label for="image-input" class="action-btn">📎</label>
            <input type="file" id="image-input" accept="image/*">
            <button type="button" id="voice-btn" class="action-btn">🎙️</button>
            <input id="input" autocomplete="off" placeholder="Mesajınızı yazın..." />
            <button id="send-btn">Göndər</button>
        </form>
    </div>

    <script>
        const socket = io(); 
        
        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const usernameInput = document.getElementById('username-input');
        const loginBtn = document.getElementById('login-btn');
        const myNameSpan = document.getElementById('my-name');
        const callBtn = document.getElementById('call-btn');
        const callStatusPanel = document.getElementById('call-status-panel');
        const callStatusText = document.getElementById('call-status-text');
        const endCallBtn = document.getElementById('end-call-btn');
        
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const imageInput = document.getElementById('image-input');
        const voiceBtn = document.getElementById('voice-btn');
        const messages = document.getElementById('messages');
        
        let myUsername = localStorage.getItem('chat_username');
        let mediaRecorder;
        let audioChunks = [];
        let isRecording = false;
        
        // Zəng daxili dəyişənlər
        let localAudioStream;
        let callMediaRecorder;

        if (myUsername) { startChat(myUsername); }

        loginBtn.addEventListener('click', () => {
            const name = usernameInput.value.trim();
            if (name) {
                localStorage.setItem('chat_username', name);
                startChat(name);
            }
        });

        function startChat(username) {
            myUsername = username;
            myNameSpan.textContent = myUsername;
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
            
            // Serverə mənim onlayn olduğumu bildir
            socket.emit('join-call-room', myUsername);
        }

        // 📞 ZƏNG ET DÜYMƏSİNƏ BASANDA
        callBtn.addEventListener('click', () => {
            const targetUser = prompt("Zəng etmək istədiyiniz şəxsin adını yazın:");
            if (!targetUser || targetUser === myUsername) return;

            callStatusPanel.style.display = 'flex';
            callStatusText.textContent = `${targetUser} ilə səsli bağlantı qurulur...`;

            navigator.mediaDevices.getUserMedia({ audio: true })
            .then(stream => {
                localAudioStream = stream;
                // Səsi canlı olaraq qarşı tərəfə paketlər halında göndəririk
                callMediaRecorder = new MediaRecorder(stream);
                callMediaRecorder.ondataavailable = event => {
                    if (event.data.size > 0) {
                        socket.emit('voice-stream', { to: targetUser, from: myUsername, data: event.data });
                    }
                };
                callMediaRecorder.start(250); // Hər 250 milisaniyədən bir səs paketini göndər
            }).catch(() => alert("Mikrofon tapılmadı"));
        });

        // Serverdən canlı səs axını gələndə (Zəngi qəbul edən tərəf)
        socket.on('incoming-voice', (info) => {
            callStatusPanel.style.display = 'flex';
            callStatusText.textContent = `${info.from} ilə canlı zəng...`;
            
            // Gələn səs paketini dərhal səsləndir
            const audioBlob = new Blob([info.data], { type: 'audio/webm' });
            const audioUrl = URL.createObjectURL(audioBlob);
            const audio = new Audio(audioUrl);
            audio.play().catch(() => {});
        });

        // ZƏNGİ BİTİRƏNDƏ
        endCallBtn.addEventListener('click', () => {
            if (callMediaRecorder) callMediaRecorder.stop();
            if (localAudioStream) localAudioStream.getTracks().forEach(track => track.stop());
            callStatusPanel.style.display = 'none';
            socket.emit('end-voice-call', myUsername);
        });

        socket.on('call-ended', () => {
            if (callMediaRecorder) callMediaRecorder.stop();
            if (localAudioStream) localAudioStream.getTracks().forEach(track => track.stop());
            callStatusPanel.style.display = 'none';
        });

        function appendMessage(msg) {
            const item = document.createElement('li');
            item.classList.add(msg.username === myUsername ? 'msg-sent' : 'msg-received');
            let contentHTML = `<div class="username">${msg.username}</div>`;
            if (msg.image) { contentHTML += `<img src="${msg.image}" class="chat-image" />`; }
            if (msg.audio) { contentHTML += `<audio src="${msg.audio}" controls class="chat-audio"></audio>`; }
            if (msg.text) { contentHTML += `<div class="msg-text">${msg.text}</div>`; }
